<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Strategic Solutions Workstream Flow">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFC" />
      <stop offset="100%" stop-color="#EEF3F7" />
    </linearGradient>
    <linearGradient id="dashGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5B7B" />
      <stop offset="100%" stop-color="#3B6C90" />
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6F6F5" />
      <stop offset="100%" stop-color="#D6EFED" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF4EA" />
      <stop offset="100%" stop-color="#FDE8D6" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1F2E3C" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#33566F" />
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7B8D9B" />
    </marker>
    <style>
      .font-display { font-family: "Abadi MT Condensed", "Aptos", "Segoe UI", Arial, sans-serif; }
      .font-body { font-family: "Abadi MT Condensed", "Aptos", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 46px; font-weight: 700; fill: #1F3A4E; letter-spacing: 0.5px; }
      .group-title { font-size: 32px; font-weight: 700; fill: #1D3649; }
      .box-title-dark { font-size: 36px; font-weight: 700; fill: #FFFFFF; }
      .box-sub-dark { font-size: 23px; font-style: italic; fill: #EAF4FB; }
      .box-title { font-size: 32px; font-weight: 700; fill: #1B3648; }
      .box-sub { font-size: 22px; font-style: italic; fill: #365569; }
      .mini-title { font-size: 27px; font-weight: 700; fill: #213E52; }
      .mini-sub { font-size: 20px; font-style: italic; fill: #486679; }
      .connector { stroke: #33566F; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
      .connector-soft { stroke: #7B8D9B; stroke-width: 4; fill: none; stroke-dasharray: 9 9; marker-end: url(#arrowSoft); }
      .chip { fill: #FFFFFF; stroke: #C8D7E2; stroke-width: 1.6; rx: 22; }
    </style>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="url(#bgGrad)" />

  <text x="960" y="58" text-anchor="middle" class="font-display title">CDC Strategic Solutions Workstream Workflow</text>

  <!-- Strategic Dashboard -->
  <g filter="url(#softShadow)">
    <rect x="665" y="90" width="590" height="132" rx="24" fill="url(#dashGrad)" />
  </g>
  <text x="960" y="146" text-anchor="middle" class="font-display box-title-dark">Strategic Dashboard</text>
  <text x="960" y="184" text-anchor="middle" class="font-body box-sub-dark">Prioritization and direction-setting</text>

  <!-- Country-by-country Review Group -->
  <g filter="url(#softShadow)">
    <rect x="350" y="262" width="1140" height="286" rx="26" fill="url(#reviewGrad)" stroke="#8BC7C2" stroke-width="3.5" />
  </g>
  <text x="920" y="308" text-anchor="middle" class="font-display group-title">Country-by-country Review</text>

  <g filter="url(#softShadow)">
    <rect x="395" y="338" width="328" height="178" rx="20" fill="#FFFFFF" stroke="#9DD3CF" stroke-width="2.5" />
    <rect x="756" y="338" width="328" height="178" rx="20" fill="#FFFFFF" stroke="#9DD3CF" stroke-width="2.5" />
    <rect x="1117" y="338" width="328" height="178" rx="20" fill="#FFFFFF" stroke="#9DD3CF" stroke-width="2.5" />
  </g>

  <text x="559" y="402" text-anchor="middle" class="font-display box-title">Country Diagnostics</text>
  <text x="559" y="442" text-anchor="middle" class="font-body box-sub">Gaps and risks</text>

  <text x="920" y="402" text-anchor="middle" class="font-display box-title">Regional Annex</text>
  <text x="920" y="442" text-anchor="middle" class="font-body box-sub">Cross-country synthesis</text>

  <text x="1281" y="402" text-anchor="middle" class="font-display box-title">TA Packages</text>
  <text x="1281" y="442" text-anchor="middle" class="font-body box-sub">Intervention planning</text>

  <!-- Execution and Learning Group -->
  <g filter="url(#softShadow)">
    <rect x="520" y="610" width="810" height="238" rx="26" fill="url(#execGrad)" stroke="#E6A671" stroke-width="3.5" />
  </g>
  <text x="925" y="658" text-anchor="middle" class="font-display group-title">Execution and Learning</text>

  <g filter="url(#softShadow)">
    <rect x="570" y="690" width="350" height="126" rx="18" fill="#FFFFFF" stroke="#EDB382" stroke-width="2.5" />
    <rect x="950" y="690" width="330" height="126" rx="18" fill="#FFFFFF" stroke="#EDB382" stroke-width="2.5" />
  </g>

  <text x="745" y="742" text-anchor="middle" class="font-display mini-title">Implementation and M&amp;E</text>
  <text x="745" y="776" text-anchor="middle" class="font-body mini-sub">Execution tracking</text>

  <text x="1115" y="742" text-anchor="middle" class="font-display mini-title">Learning Loop</text>
  <text x="1115" y="776" text-anchor="middle" class="font-body mini-sub">Feedback and adaptation</text>

  <!-- Strategic Inputs -->
  <g filter="url(#softShadow)">
    <rect x="55" y="298" width="255" height="274" rx="22" fill="#FFFFFF" stroke="#CCD8E1" stroke-width="2.5" />
  </g>
  <text x="183" y="338" text-anchor="middle" class="font-display group-title" font-size="27">Strategic Inputs</text>

  <rect x="78" y="364" width="209" height="86" rx="14" class="chip" />
  <rect x="78" y="468" width="209" height="86" rx="14" class="chip" />

  <text x="183" y="399" text-anchor="middle" class="font-display mini-title" font-size="23">Humanitarian Intelligence</text>
  <text x="183" y="430" text-anchor="middle" class="font-body mini-sub" font-size="18">Context and access</text>

  <text x="183" y="503" text-anchor="middle" class="font-display mini-title" font-size="23">Solutions Inventory</text>
  <text x="183" y="534" text-anchor="middle" class="font-body mini-sub" font-size="18">Available options</text>

  <!-- Operational Enablers -->
  <g filter="url(#softShadow)">
    <rect x="1540" y="270" width="325" height="462" rx="22" fill="#FFFFFF" stroke="#CCD8E1" stroke-width="2.5" />
  </g>
  <text x="1702" y="314" text-anchor="middle" class="font-display group-title" font-size="28">Operational Enablers</text>

  <rect x="1568" y="340" width="269" height="76" rx="14" class="chip" />
  <rect x="1568" y="430" width="269" height="76" rx="14" class="chip" />
  <rect x="1568" y="520" width="269" height="76" rx="14" class="chip" />
  <rect x="1568" y="610" width="269" height="76" rx="14" class="chip" />

  <text x="1702" y="384" text-anchor="middle" class="font-display mini-title" font-size="24">CDC Expert Team</text>
  <text x="1702" y="474" text-anchor="middle" class="font-display mini-title" font-size="24">Standardized Tools</text>
  <text x="1702" y="564" text-anchor="middle" class="font-display mini-title" font-size="24">Strategic Resources</text>
  <text x="1702" y="654" text-anchor="middle" class="font-display mini-title" font-size="24">GPEI Priority Epi Blocks</text>

  <!-- Main process arrows -->
  <path d="M960 222 L960 332" class="connector" />
  <path d="M723 427 L756 427" class="connector" />
  <path d="M1084 427 L1117 427" class="connector" />
  <path d="M1281 516 C1281 602, 890 614, 745 690" class="connector" />
  <path d="M920 753 L950 753" class="connector" />
  <path d="M1115 690 C1250 610, 1320 382, 1135 222" class="connector" />

  <!-- Support arrows -->
  <path d="M310 435 C322 435, 340 435, 350 435" class="connector-soft" />
  <path d="M1540 500 C1518 500, 1504 500, 1490 500" class="connector-soft" />
  <path d="M1540 640 C1468 664, 1400 700, 1330 730" class="connector-soft" />

  <!-- Legend -->
  <g transform="translate(55,905)">
    <rect x="0" y="0" width="1810" height="138" rx="16" fill="#FFFFFF" stroke="#D0DEE7" stroke-width="2" />
    <text x="26" y="44" class="font-display" font-size="30" fill="#1F3A4E" font-weight="700">Legend</text>
    <line x1="180" y1="36" x2="280" y2="36" class="connector" />
    <text x="300" y="44" class="font-body" font-size="24" fill="#2A4A60">Primary workflow</text>
    <line x1="600" y1="36" x2="700" y2="36" class="connector-soft" />
    <text x="720" y="44" class="font-body" font-size="24" fill="#2A4A60">Input and support flow</text>
    <text x="26" y="95" class="font-body" font-size="22" fill="#486679">This visual is optimized for 16:9 PowerPoint slides (1920x1080).</text>
  </g>
</svg>
